<svg xmlns="http://www.w3.org/2000/svg" width="440" height="112" viewBox="0 0 440 112" fill="none" role="img" aria-labelledby="rcTitle">
  <title id="rcTitle">readcon-core</title>
  <desc>CON configuration reader: document with type-grouped atom columns and multi-format ingress</desc>
  <!-- Document body -->
  <rect x="10" y="14" width="72" height="84" rx="8" fill="#F8FAFC" stroke="#1E1B4B" stroke-width="2.5"/>
  <!-- Header band (9-line CON header metaphor — single strong strip) -->
  <rect x="10" y="14" width="72" height="18" rx="8" fill="#312E81"/>
  <rect x="10" y="24" width="72" height="8" fill="#312E81"/>
  <!-- JSON metadata glint on header -->
  <rect x="18" y="20" width="28" height="4" rx="1" fill="#A5B4FC"/>
  <rect x="50" y="20" width="14" height="4" rx="1" fill="#FBBF24"/>
  <!-- Type-group columns (species blocks, not RAD marker rows) -->
  <rect x="18" y="40" width="14" height="48" rx="2" fill="#4F46E5"/>
  <rect x="36" y="48" width="14" height="40" rx="2" fill="#6366F1"/>
  <rect x="54" y="56" width="14" height="32" rx="2" fill="#818CF8"/>
  <!-- atom_id identity nodes -->
  <circle cx="25" cy="46" r="2.5" fill="#FBBF24"/>
  <circle cx="43" cy="54" r="2.5" fill="#FBBF24"/>
  <circle cx="61" cy="62" r="2.5" fill="#FBBF24"/>
  <!-- Ingress chevrons: many formats → one CON (left of wordmark) -->
  <g opacity="0.9">
    <path d="M92 36 L100 44 L92 52" stroke="#64748B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M98 36 L106 44 L98 52" stroke="#4F46E5" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Wordmark -->
  <text x="118" y="58" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="34" font-weight="750" letter-spacing="-1.2" fill="#1E1B4B">readcon</text>
  <text x="118" y="82" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="15" font-weight="600" letter-spacing="0.12em" fill="#4338CA">CORE · CON I/O</text>
</svg>
