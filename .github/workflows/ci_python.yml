name: Python ReadCon

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/python/**'
      - 'resources/test/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - '.github/workflows/ci_python.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/python/**'
      - 'resources/test/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - '.github/workflows/ci_python.yml'
  workflow_dispatch:

concurrency:
  group: python-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  pytest:
    name: pytest (${{ matrix.features }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - features: python
            name: lean
          - features: python,chemfiles
            name: chemfiles
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install maturin and pytest
        run: |
          python -m pip install -U pip
          python -m pip install maturin pytest numpy

      - name: maturin develop
        env:
          # match wheel CI: avoid mold breakage on some runners
          RUSTFLAGS: "-C link-arg=-fuse-ld=bfd"
        run: |
          maturin develop --features '${{ matrix.features }}'

      - name: pytest tests/python
        run: |
          python -m pytest tests/python/ -q --tb=short
