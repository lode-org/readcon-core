# Publish readcon-core to crates.io on version tags.
# Secret: CARGO_REGISTRY_TOKEN (crates.io API token for the publish owner).
# cargo-dist's Release workflow handles binary archives + GitHub Release only.
name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.13.0); defaults to ref'
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish-crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Skip if version already on crates.io
        id: check
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ -n "${{ inputs.tag }}" ]; then
            version="${{ inputs.tag }}"
            version="${version#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if curl -sfL \
              -H "User-Agent: readcon-core-release-check (lode-org)" \
              "https://crates.io/api/v1/crates/readcon-core/${version}" \
              -o /dev/null; then
              echo "already_published=true" >> "$GITHUB_OUTPUT"
              echo "readcon-core ${version} is already published; skipping."
          else
              echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: cargo publish
        if: steps.check.outputs.already_published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN secret is empty; set it on the repo." >&2
            exit 1
          fi
          cargo publish --locked
