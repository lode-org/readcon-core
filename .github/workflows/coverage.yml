# Multi-language coverage for Codecov (rust / python / julia / fortran flags).
# Adapted from https://github.com/metatensor/metatensor/pull/939 and
# HaoZeke/capnp-fortran coverage soft-fail pattern.
#
# Live dashboard: https://app.codecov.io/gh/lode-org/readcon-core
# Requires GitHub Actions secret CODECOV_TOKEN from
# https://app.codecov.io/github/HaoZeke (or the lode-org/readcon-core page).
# Upload steps use fail_ci_if_error: false so a missing token never reds CI.

name: Coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  coverage-rust:
    runs-on: ubuntu-22.04
    name: rust coverage
    strategy:
      matrix:
        llvm-version: [20]
    env:
      CMAKE_C_COMPILER: clang-${{ matrix.llvm-version }}
      CMAKE_CXX_COMPILER: clang++-${{ matrix.llvm-version }}
      CC: clang-${{ matrix.llvm-version }}
      CXX: clang++-${{ matrix.llvm-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup LLVM
        run: |
            wget https://apt.llvm.org/llvm.sh
            chmod +x llvm.sh
            sudo ./llvm.sh ${{ matrix.llvm-version }}
            sudo apt-get update
            sudo apt-get install --no-install-recommends -y clang-${{ matrix.llvm-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          environments: default

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        with:
          version: "v0.10.0"

      - name: Setup sccache environment
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Generate rust code coverage
        id: coverage
        run: |
          PIXI_PYTHON="$(pixi r -e default which python)"
          PYO3_PYTHON="$PIXI_PYTHON" pixi r -e default \
            cargo llvm-cov --features rpc,python --workspace \
            --no-fail-fast --codecov \
            --include-ffi \
            --output-path rust_codecov.json
          test -s rust_codecov.json

      - name: Upload rust coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-rust
          path: rust_codecov.json
          if-no-files-found: error

      # Do not gate with `if: secrets.*` — that can fail workflow load.
      # Empty token → soft failure (fail_ci_if_error: false).
      - name: Upload rust coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: rust_codecov.json
          flags: rust
          name: readcon-core-rust
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  coverage-python:
    runs-on: ubuntu-22.04
    name: python coverage
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install maturin, pytest-cov
        run: |
          python -m pip install -U pip
          python -m pip install maturin pytest pytest-cov numpy coverage

      - name: maturin develop (python feature)
        env:
          RUSTFLAGS: "-C link-arg=-fuse-ld=bfd"
        run: maturin develop --features python

      - name: pytest with coverage XML
        run: |
          # Exercise the shipped Python binding surface via the real tests/python
          # entry points. readcon is a PyO3 extension, so line hits are mostly in
          # the import path; the rust job already covers src/python.rs via llvm-cov.
          # Codecov flag `python` still records that the binding suite ran.
          python -m pytest tests/python/ -q --tb=short \
            --cov=readcon \
            --cov-report=xml:python_coverage.xml \
            --cov-report=term-missing \
            --cov-branch
          test -s python_coverage.xml
          head -c 400 python_coverage.xml; echo

      - name: Upload python coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python
          path: python_coverage.xml
          if-no-files-found: error

      - name: Upload python coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: python_coverage.xml
          flags: python
          name: readcon-core-python
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  coverage-julia:
    runs-on: ubuntu-22.04
    name: julia coverage
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'

      - name: Build libreadcon_core
        run: cargo build --release --features chemfiles

      - name: Julia tests with Coverage.jl
        env:
          READCON_CORE_LIB: ${{ github.workspace }}/target/release/libreadcon_core.so
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: |
          cd julia/ReadCon
          julia --project=. -e '
            using Pkg
            Pkg.instantiate()
            Pkg.add("Coverage")
            Pkg.test(; coverage=true)
            using Coverage
            cov = process_folder("src")
            LCOV.writefile("lcov.info", cov)
            println("Julia coverage files: ", length(cov))
          '
          test -s lcov.info
          # Ensure at least one DA: line or SF: header for a real LCOV file
          grep -E '^(SF:|DA:|TN:)' lcov.info | head -5

      - name: Upload julia coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-julia
          path: julia/ReadCon/lcov.info
          if-no-files-found: error

      - name: Upload julia coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: julia/ReadCon/lcov.info
          flags: julia
          name: readcon-core-julia
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  coverage-fortran:
    runs-on: ubuntu-22.04
    name: fortran coverage
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install gfortran, fpm, lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran build-essential cmake lcov
          curl -LO https://github.com/fortran-lang/fpm/releases/download/v0.10.1/fpm-0.10.1-linux-x86_64
          sudo install -m 755 fpm-0.10.1-linux-x86_64 /usr/local/bin/fpm

      - name: Build libreadcon_core (chemfiles)
        run: |
          for attempt in 1 2 3; do
            if cargo build --release --features chemfiles; then
              break
            fi
            if [[ "$attempt" -eq 3 ]]; then
              exit 1
            fi
            echo "cargo build failed (attempt $attempt), retrying..." >&2
            sleep 5
          done

      - name: Fortran instrumented tests + gcov/lcov
        env:
          GFORTRAN_ERROR_BACKTRACE: "0"
        run: |
          set -euo pipefail
          ROOT="${{ github.workspace }}"
          export LD_LIBRARY_PATH="$ROOT/target/release:${LD_LIBRARY_PATH:-}"
          FFLAGS="-cpp -ffpe-summary=none --coverage"
          EXTRA="-lstdc++ --coverage"
          cd "$ROOT/fortran/ReadCon"
          # Clean prior build so gcov sees fresh .gcda from this run
          rm -rf build
          fpm test --flag "-L$ROOT/target/release $FFLAGS" \
            --link-flag "-L$ROOT/target/release -lreadcon_core -ldl -lpthread -lm $EXTRA"
          # Collect gcov data from fpm build tree (src only)
          find build -name '*.gcda' | head -20
          lcov --directory build --capture --output-file "$ROOT/fortran_coverage.info" \
            --rc lcov_branch_coverage=1 || \
            lcov --directory build --capture --output-file "$ROOT/fortran_coverage.info"
          # Keep only package sources
          lcov --extract "$ROOT/fortran_coverage.info" '*/fortran/ReadCon/src/*' \
            --output-file "$ROOT/fortran_coverage.info" || true
          # If extract emptied the file, fall back to full capture minus system paths
          if ! grep -q '^SF:' "$ROOT/fortran_coverage.info" 2>/dev/null; then
            lcov --directory build --capture --output-file "$ROOT/fortran_coverage.info"
            lcov --remove "$ROOT/fortran_coverage.info" '/usr/*' '*/fpm/*' \
              --output-file "$ROOT/fortran_coverage.info" || true
          fi
          test -s "$ROOT/fortran_coverage.info"
          grep -E '^(SF:|DA:)' "$ROOT/fortran_coverage.info" | head -20

      - name: Upload fortran coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-fortran
          path: fortran_coverage.info
          if-no-files-found: error

      - name: Upload fortran coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: fortran_coverage.info
          flags: fortran
          name: readcon-core-fortran
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true
