name: Fortran (fpm)

on:
  push:
    branches: [main]
    paths:
      - "fortran/**"
      - "include/readcon-core.h"
      - "src/ffi.rs"
      - "src/chemfiles_*.rs"
      - "src/types.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "resources/test/**"
      - ".github/workflows/ci_fortran.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  fpm-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran build-essential cmake
          curl -LO https://github.com/fortran-lang/fpm/releases/download/v0.10.1/fpm-0.10.1-linux-x86_64
          sudo install -m 755 fpm-0.10.1-linux-x86_64 /usr/local/bin/fpm
      - name: Build readcon_core (chemfiles ON)
        run: cargo build --release --features chemfiles
      - name: fpm test
        working-directory: fortran/ReadCon
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: |
          fpm test --flag "-L${{ github.workspace }}/target/release" \
            --link-flag "-L${{ github.workspace }}/target/release -lreadcon_core -ldl -lpthread -lm -lstdc++"
