[workspace]
members = ["cargo:."]

# Config for 'dist' (cargo-dist 0.28) — generates .github/workflows/release.yml
# Release PR workflow: open a PR with the version bump; CI runs `dist plan` on the
# PR (validation). After merge, push a signed `vX.Y.Z` tag to publish artifacts
# and the GitHub Release. crates.io is handled by crates_publish.yml (uses
# CARGO_REGISTRY_TOKEN). PyPI wheels remain python_wheels.yml on the same tag.
[dist]
cargo-dist-version = "0.28.0"
ci = "github"
# Run plan (and optional artifact upload) on every PR so release PRs are checked
# before the tag is cut.
pr-run-mode = "plan"
installers = []
# CLI binary archives (main.rs). C/C++ static/shared libs are not packaged by
# dist; ship headers via the repo / cargo-c install path.
targets = [
    "aarch64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
]
github-releases = true
# Create GitHub releases from the tag; PR mode only plans.
create-release = true
